version: '3.8'

services:
  terminal-secretary:
    build: .
    network_mode: host
    volumes:
      - .:/app
      - /run/user/${USER_ID:-1000}/pulse:/run/user/${USER_ID:-1000}/pulse
      - ${PULSE_CONFIG_DIR:-${HOME}/.config/pulse}:/root/.config/pulse:ro
      - data:/app/data
    environment:
      - USER_ID=${USER_ID:-1000}
      - MIC_SOURCE=${MIC_SOURCE}
      - MONITOR_SOURCE=${MONITOR_SOURCE}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://localhost:11434}
      - MODEL_SIZE=${MODEL_SIZE:-small}
      - SUMMARIZER_MODEL=${SUMMARIZER_MODEL:-llama3}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    devices:
      - /dev/snd:/dev/snd
    stdin_open: true
    tty: true
    restart: unless-stopped

volumes:
  data:
